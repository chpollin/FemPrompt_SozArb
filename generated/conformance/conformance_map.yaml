# conformance_map.yaml
#
# Machine-readable conformance status of this review against three reporting
# standards: PRISMA 2020, PRISMA-trAIce, and RAISE. One entry per checklist
# item, each carrying its status and either a repository source path or a
# named gap. This is the item-level status substrate; the standards prose,
# item text, priority levels, and citations live in knowledge/standards.md.
#
# R4 (Stage R record generation in knowledge/plan.md) consumes this file: it
# fills both checklists from the per-item status and source_path here, the R2
# replay supplies count-bearing values, and the conformance evaluation reads
# the partial and gap rows as its honest-conformance section.
#
# Status vocabulary:
#   reconstructable  - fully backed by committed data or documentation; for
#                      count-bearing items the value falls out of the R2 replay
#   partial          - part of the item is backed, a stated portion is missing
#                      or not yet consolidated
#   gap              - cannot be reconstructed from the recorded data; named,
#                      not hidden
#   not_applicable   - does not apply to this review type (qualitative field
#                      review, screening and categorisation, no meta-analysis,
#                      no per-study risk-of-bias appraisal, no effect measures,
#                      no certainty rating)
#
# Count-bearing caveat: the retrospective flow counts and agreement figures
# are reconstructable but not yet asserted by a committed replay; R2 must
# supersede any hand recount before R4 publishes the record.

