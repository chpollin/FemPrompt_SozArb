    notes: The AI tools and stages are documented; a single abstract-level summary is addressable in the disclosure.
  - standard: PRISMA-trAIce
    item_id: I1
    item_short: Rationale for using AI tools
    status: reconstructable
    source_path: knowledge/methods.md, knowledge/project.md
    notes: The rationale is testing the technology, not reducing effort.
  - standard: PRISMA-trAIce
    item_id: M1
